services:
  samba-dev:
      image: "wbclient-test-image"
      container_name: wbclient-test
      hostname: wbclient-test
      command: ["bash", "-c", "winbindd -D || true; exec tail -f /dev/null"]
      volumes:
        - ../../:/usr/src
        - go-modules:/root/go/pkg/mod
        - go-cache:/root/.cache
        - /sys/fs/cgroup:/sys/fs/cgroup:rw
        - /etc/localtime:/etc/localtime:ro
        - samba-state-netads:/var/lib/samba/private
        - samba-config-netads:/etc/samba
      working_dir: /usr/src
      privileged: true
      ports:
        - "8080:8080"
      environment:
        - WBCLIENT_API_TOKEN=secret
        - WBCLIENT_PORT=8080
      dns:
        - ${DC_IP}
      dns_search:
        - ${DOMAIN_NAME}
      tty: true
      stdin_open: true
      cgroup: host
      stop_signal: SIGRTMIN+3
      tmpfs:
        - /run
        - /run/lock
volumes:
    go-modules: {}
    go-cache: {}
    samba-state-netads: {}
    samba-config-netads: {}
