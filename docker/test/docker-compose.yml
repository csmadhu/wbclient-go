services:
  samba-dev:
      image: "wbclient-test-image"
      container_name: wbclient-test
      volumes:
        - ../../:/usr/src
        - go-modules:/root/go/pkg/mod
        - go-cache:/root/.cache
        - /sys/fs/cgroup:/sys/fs/cgroup:rw
        - /etc/localtime:/etc/localtime:ro
      working_dir: /usr/src
      privileged: true
      ports:
        - "8080:8080"
      environment:
        - WBCLIENT_API_TOKEN=secret
        - WBCLIENT_PORT=8080
      tty: true
      stdin_open: true
      cgroup: host
      stop_signal: SIGRTMIN+3
      tmpfs:
        - /run
        - /run/lock
volumes:
    pgdata: {}
    pgdata-op: {}
    pgdatasec1: {}
    pgdatasec2: {}
    pgdatasec3: {}
    pgdatasec4: {}
    go-modules: {}
    go-cache: {}
    go-modules-fips: {}
    go-cache-fips: {}
