services:
  samba-service:
      image: "wbclient-service-image"
      container_name: wbclient-service
      network_mode: host
      volumes:
        - ../../:/usr/src/wbclient
        - go-modules-svc:/root/go/pkg/mod
        - go-cache-svc:/root/.cache
        - /sys/fs/cgroup:/sys/fs/cgroup:rw
        - /etc/localtime:/etc/localtime:ro
      privileged: true
      environment:
        - WBCLIENT_API_TOKEN=${WBCLIENT_API_TOKEN}
        - WBCLIENT_PORT=${WBCLIENT_PORT:-8080}
      tty: true
      stdin_open: true
      stop_signal: SIGRTMIN+3
      tmpfs:
        - /run
        - /run/lock
volumes:
    go-modules-svc: {}
    go-cache-svc: {}
