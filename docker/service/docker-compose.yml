services:
  samba-service:
      image: "wbclient-service-image"
      container_name: wbclient-service
      volumes:
        - ../../:/usr/src
        - go-modules-svc:/root/go/pkg/mod
        - go-cache-svc:/root/.cache
        - /sys/fs/cgroup:/sys/fs/cgroup:rw
        - /etc/localtime:/etc/localtime:ro
      working_dir: /usr/src
      privileged: true
      ports:
        - "8080:8080"
      environment:
        - WBCLIENT_API_TOKEN=${WBCLIENT_API_TOKEN}
        - WBCLIENT_PORT=${WBCLIENT_PORT:-8080}
        - AD_USERNAME=${AD_USERNAME}
        - AD_PASSWORD=${AD_PASSWORD}
        - DOMAIN_NAME=${DOMAIN_NAME}
        - DC_IP=${DC_IP}
        - DC_HOSTNAME=${DC_HOSTNAME}
        - WORKGROUP=${WORKGROUP}
        - REALM=${REALM}
      tty: true
      stdin_open: true
      stop_signal: SIGRTMIN+3
      tmpfs:
        - /run
        - /run/lock
volumes:
    go-modules-svc: {}
    go-cache-svc: {}
